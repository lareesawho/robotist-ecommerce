<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Comparison — Robotist | Compare All 13 Robots</title>
<meta name="description" content="Compare all 13 Robotist robots side-by-side — humanoid, quadruped, cleaning, and industrial. Specs, pricing, and use cases.">
<link rel="canonical" href="https://www.robotist.com.au/compare.html">
<meta property="og:title" content="Product Comparison — Robotist | Compare All 13 Robots">
<meta property="og:description" content="Side-by-side comparison of all 13 robots — humanoid, quadruped, cleaning, industrial.">
<meta property="og:url" content="https://www.robotist.com.au/compare.html">
<style>
:root {
  --bg-0: #030810; --bg-1: #060D18; --bg-2: #0C1828; --bg-3: #142035;
  --accent: #4AA8C8; --accent-dim: #2E8FB5; --accent-glow: rgba(74,168,200,.10);
  --white: #F0F4F8; --grey-1: #8A9BB0; --grey-2: #4A5A6A; --grey-3: #1E2D3D;
  --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --nav-h: 72px; --gutter: clamp(16px, 4vw, 40px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { background: var(--bg-0); color: var(--white); font-family: var(--font); -webkit-font-smoothing: antialiased; }
a { color: var(--accent); text-decoration: none; }

/* Nav */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 500; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--gutter); background: rgba(3,8,16,.92); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(74,168,200,.08); }
.nav-logo { font-size: 16px; font-weight: 700; letter-spacing: .15em; color: var(--white); text-transform: uppercase; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: clamp(20px, 3vw, 40px); list-style: none; }
.nav-links a { font-weight: 600; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--grey-1); }
.nav-links a:hover, .nav-links a.active { color: var(--white); }

/* Page */
.page { padding: calc(var(--nav-h) + 40px) var(--gutter) 80px; max-width: 1400px; margin: 0 auto; }
.page h1 { font-size: clamp(28px, 3vw, 42px); font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
.page-sub { color: var(--grey-1); font-size: 14px; margin-bottom: 32px; }

/* Filters */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-btn { padding: 8px 16px; border-radius: 100px; border: 1px solid var(--grey-3); background: var(--bg-1); color: var(--grey-1); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* Comparison table */
.comp-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.comp-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; }
.comp-table th, .comp-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--grey-3); font-size: 13px; }
.comp-table thead th { position: sticky; top: var(--nav-h); background: var(--bg-1); z-index: 10; font-weight: 600; color: var(--white); white-space: nowrap; }
.comp-table thead th:first-child { border-radius: 8px 0 0 0; }
.comp-table thead th:last-child { border-radius: 0 8px 0 0; }
.comp-table tbody td { background: var(--bg-1); vertical-align: middle; }
.comp-table tbody tr:hover td { background: var(--bg-2); }
.comp-table .prod-cell { display: flex; align-items: center; gap: 10px; min-width: 180px; }
.comp-table .prod-img { width: 40px; height: 40px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.comp-table .prod-img img { max-width: 32px; max-height: 32px; object-fit: contain; }
.comp-table .prod-name { font-weight: 600; font-size: 13px; color: var(--white); }
.comp-table .prod-cat { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; }
.comp-table .price { font-weight: 600; white-space: nowrap; }
.comp-table .tag { display: inline-block; padding: 3px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: .04em; }
.tag-humanoid { background: rgba(74,168,200,.15); color: var(--accent); }
.tag-quadruped { background: rgba(168,220,239,.10); color: #A8DCEF; }
.tag-cleaning { background: rgba(142,200,74,.10); color: #8EC84A; }
.tag-industrial { background: rgba(200,168,74,.10); color: #C8A84A; }

/* Responsive card view */
.card-grid { display: none; }
@media (max-width: 900px) {
  .comp-wrap { display: none; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
}
.card-grid-item { background: var(--bg-1); border: 1px solid var(--grey-3); border-radius: 8px; padding: 20px; }
.card-grid-item .cgi-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.card-grid-item .cgi-img { width: 56px; height: 56px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-grid-item .cgi-img img { max-width: 44px; max-height: 44px; object-fit: contain; }
.card-grid-item .cgi-price { font-size: 22px; font-weight: 700; margin-top: 8px; }
.card-grid-item .cgi-specs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.card-grid-item .cgi-specs span { display: inline-block; padding: 4px 10px; background: var(--bg-2); border-radius: 100px; font-size: 11px; color: var(--grey-1); }
.card-grid-item .cgi-link { display: inline-block; margin-top: 12px; font-size: 12px; font-weight: 600; color: var(--accent); }

/* Footer */
.footer { border-top: 1px solid rgba(74,168,200,.08); padding: 40px var(--gutter); margin-top: 60px; }
.footer-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; font-size: 12px; color: var(--grey-2); }
.footer-links { display: flex; gap: 24px; }
.footer-links a { color: var(--grey-1); }
.footer-links a:hover { color: var(--white); }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">Robot<span>ist</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/">Catalogue</a></li>
    <li><a href="/compare.html" class="active">Compare</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/contact.html">Contact</a></li>
  </ul>
</nav>

<div class="page">
  <h1>Product Comparison</h1>
  <p class="page-sub">13 robots across 4 categories. Side-by-side specs, pricing, and use cases.</p>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filter('all')">All</button>
    <button class="filter-btn" onclick="filter('Humanoid')">Humanoid</button>
    <button class="filter-btn" onclick="filter('Quadruped')">Quadruped</button>
    <button class="filter-btn" onclick="filter('Cleaning')">Cleaning</button>
    <button class="filter-btn" onclick="filter('Industrial')">Industrial</button>
  </div>

  <!-- Desktop table -->
  <div class="comp-wrap">
    <table class="comp-table" id="compTable">
      <thead>
        <tr>
          <th>Robot</th><th>Category</th><th>Price (AUD)</th><th>Key Spec</th><th>Use Case</th><th>Lead Time</th><th></th>
        </tr>
      </thead>
      <tbody id="compBody">
      </tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div class="card-grid" id="cardGrid"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span>Robotist Pty Ltd</span>
    <div class="footer-links">
      <a href="/">Home</a><a href="/compare.html">Compare</a><a href="/about.html">About</a><a href="/contact.html">Contact</a>
    </div>
    <span>&copy; 2025 Robotist. Sydney, Australia.</span>
  </div>
</footer>

<script>
var products = [
  { name: "PNDbotics ADAM", cat: "Humanoid", price: "AUD 128,000", spec: "41-DOF · Modular PSA · Mocap", use: "AI Research · Industrial Automation", lead: "8–12 weeks", img: "robots/pnd_robotics_adam.webp", file: "products/pndbotics-adam.html" },
  { name: "Fourier GR-3", cat: "Humanoid", price: "AUD 148,000", spec: "55-DOF · Emotion AI · 12-DOF Hands", use: "Healthcare · Aged Care · Concierge", lead: "8–12 weeks", img: "robots/fourier_gr3_upscale.webp", file: "products/fourier-gr-3.html" },
  { name: "UniX AI Panther", cat: "Humanoid", price: "AUD 88,000", spec: "34-DOF · 8-DoF Arms · 16hr Battery", use: "Domestic Service · Retail", lead: "8–12 weeks", img: "robots/unix_panther.webp", file: "products/unix-ai-panther.html" },
  { name: "LimX OLI", cat: "Humanoid", price: "AUD 58,000", spec: "33-DOF · NVIDIA Orin 157 TOPS · ROS2", use: "Research · Tech Showcases", lead: "8–12 weeks", img: "robots/limx_oli.webp", file: "products/limx-oli.html" },
  { name: "MagicDog Y1", cat: "Quadruped", price: "AUD 110,000", spec: "6 m/s · 45kg Payload · 157 TOPS", use: "Security · Heavy Inspection", lead: "8–12 weeks", img: "robots/magiclab_magicdog_y1.webp", file: "products/magiclab-magicdog-y1.html" },
  { name: "Genisom M1", cat: "Quadruped", price: "AUD 78,000", spec: "80cm Obstacle · Rugged Terrain", use: "Industrial Inspection · Surveying", lead: "8–12 weeks", img: "robots/genisum_m1.webp", file: "products/genisom-m1.html" },
  { name: "Genisom L1", cat: "Quadruped", price: "AUD 22,000", spec: "6km Range · SLAM · Open API", use: "Research · SLAM Development", lead: "8–12 weeks", img: "robots/genisom_l1.webp", file: "products/genisom-l1.html" },
  { name: "Genisom L1 EDU", cat: "Quadruped", price: "AUD 30,000", spec: "Curriculum Bundle · SLAM Teaching", use: "University Robotics Education", lead: "8–12 weeks", img: "robots/genisum_l1_edu.webp", file: "products/genisom-l1-edu.html" },
  { name: "MagicDog", cat: "Quadruped", price: "AUD 18,500", spec: "13-DOF · 3 m/s · Open SDK", use: "STEM Education · Light Demos", lead: "8–12 weeks", img: "robots/magiclab_magicdog.webp", file: "products/magiclab-magicdog.html" },
  { name: "Gausium Phantas", cat: "Cleaning", price: "AUD 48,000", spec: "1,180 m²/hr · 4-in-1 · RaaS", use: "Commercial Floor Cleaning", lead: "8–12 weeks", img: "robots/gausium_phantas.webp", file: "products/gausium-phantas.html" },
  { name: "Keenon C40-P1", cat: "Cleaning", price: "AUD 32,000", spec: "1,100 m²/hr · 15hr Runtime", use: "Commercial Cleaning · Compact", lead: "8–12 weeks", img: "robots/keenon_c40-p1.webp", file: "products/keenon-c40-p1.html" },
  { name: "iSAGE STAR-SageMan", cat: "Industrial", price: "AUD 158,000", spec: "±0.03mm · Quad-Armed · Biopharma", use: "Precision Manufacturing · Labs", lead: "8–12 weeks", img: "robots/isage_quad-armed_wheeled_robot.webp", file: "products/isage-star-sageman.html" },
  { name: "Qisheng D2", cat: "Industrial", price: "AUD 38,000", spec: "Modular Workstation · Pick & Place", use: "Industrial Automation", lead: "8–12 weeks", img: "robots/qisheng_scheme_2_d2.webp", file: "products/qisheng-d2.html" }
];

function tagClass(cat) {
  if (cat === 'Humanoid') return 'tag-humanoid';
  if (cat === 'Quadruped') return 'tag-quadruped';
  if (cat === 'Cleaning') return 'tag-cleaning';
  return 'tag-industrial';
}

function render(filterCat) {
  var filtered = filterCat === 'all' ? products : products.filter(function(p) { return p.cat === filterCat; });
  
  // Table
  var tbody = document.getElementById('compBody');
  tbody.innerHTML = filtered.map(function(p) {
    return '<tr>' +
      '<td><div class="prod-cell"><div class="prod-img"><img src="' + p.img + '" alt="' + p.name + '" loading="lazy"></div><div><div class="prod-name">' + p.name + '</div></div></div></td>' +
      '<td><span class="tag ' + tagClass(p.cat) + '">' + p.cat + '</span></td>' +
      '<td class="price">' + p.price + '</td>' +
      '<td style="font-size:12px;color:var(--grey-1)">' + p.spec + '</td>' +
      '<td style="font-size:12px;color:var(--grey-1)">' + p.use + '</td>' +
      '<td style="font-size:12px;color:var(--grey-1)">' + p.lead + '</td>' +
      '<td><a href="' + p.file + '" style="font-size:12px;font-weight:600">View →</a></td>' +
      '</tr>';
  }).join('');

  // Cards
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = filtered.map(function(p) {
    return '<div class="card-grid-item">' +
      '<div class="cgi-top"><div class="cgi-img"><img src="' + p.img + '" alt="' + p.name + '" loading="lazy"></div><div><div style="font-weight:600;font-size:14px">' + p.name + '</div><span class="tag ' + tagClass(p.cat) + '">' + p.cat + '</span></div></div>' +
      '<div class="cgi-price">' + p.price + '</div>' +
      '<div class="cgi-specs"><span>' + p.spec + '</span><span>' + p.use + '</span><span>' + p.lead + '</span></div>' +
      '<a href="' + p.file + '" class="cgi-link">View full specs →</a>' +
      '</div>';
  }).join('');
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  render(cat);
}

render('all');
</script>

</body>
</html>
